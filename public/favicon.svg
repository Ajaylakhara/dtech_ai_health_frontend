<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>

    <!-- Activity Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded base/plate -->
  <rect x="12" y="12" width="104" height="104" rx="28" fill="url(#bgGradient)" />

  <!-- Subtle Inner Border/Shadow -->
  <rect x="14" y="14" width="100" height="100" rx="26" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2" />

  <!-- Activity Pulse/Wave Line -->
  <!-- FiActivity zigzag: moving point to point -->
  <path d="M 34 64 L 46 64 L 54 42 L 64 86 L 74 54 L 82 64 L 94 64" 
        fill="none" 
        stroke="#FFFFFF" 
        stroke-width="7.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#glow)" />
</svg>
